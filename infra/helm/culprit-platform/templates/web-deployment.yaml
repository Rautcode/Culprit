apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-web
  labels:
    app.kubernetes.io/name: culprit-web
    app.kubernetes.io/part-of: culprit
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: culprit-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: culprit-web
        app.kubernetes.io/part-of: culprit
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
      containers:
        - name: web
          image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}"
          imagePullPolicy: {{ .Values.web.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.web.port }}
          readinessProbe:
            httpGet:
              path: /incidents
              port: http
            initialDelaySeconds: 3
          livenessProbe:
            httpGet:
              path: /incidents
              port: http
            initialDelaySeconds: 10
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
