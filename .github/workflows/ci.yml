# CI + automated evaluation (build step 10, SPEC_VERSION.md).
#
# The pytest job IS the golden-set evaluation: every harness scenario is a
# ground-truthed incident, and the parametrized suite asserts precision@1
# = 100% (top candidate == injected cause) plus the full expectation set —
# confidence floors, rule hits, evidence citations, decoy ordering,
# timeline chronology — and the LLM layer's guardrail contract. A rule or
# weight change that flips any ranking fails this gate before merge.
#
# Deliberately absent until they have something real to run against:
# container build/push (needs registries + the Phase 2 service split) and
# deploy jobs (build step 9 — EKS/ArgoCD). Per-service path filtering
# arrives with the service split (docs/04-folder-structure.md).
name: ci

permissions:
  contents: write   # lets the failure step post the log as a commit comment

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pipeline-eval:
    name: pipeline tests + golden-set eval
    runs-on: ubuntu-latest
    services:
      postgres:
        # Same image as docker-compose — the Postgres backends
        # (correlation_engine/db) are proven against a real database on
        # every push; locally those tests skip when POSTGRES_DSN is unset.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: culprit
          POSTGRES_PASSWORD: culprit
          POSTGRES_DB: culprit
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U culprit"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_DSN: postgresql://culprit:culprit@localhost:5432/culprit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install pytest "psycopg[binary]>=3.1"
      - name: Regression suite + golden-set evaluation (precision@1 gate)
        run: python -m pytest services/correlation-engine/tests services/ai-reasoning/tests -v 2>&1 | tee pytest.log
      - name: Publish failure log as commit comment
        # This environment drives CI via the public API without auth, so a
        # failing run must surface its own diagnostics somewhere readable:
        # commit comments are public; the workflow token can write them.
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          printf 'CI pipeline-eval failed. pytest log tail:\n\n```\n%s\n```\n' "$(tail -c 55000 pytest.log)" > comment.md
          gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/comments" -F body=@comment.md || true
      - name: UI data drift check
        # apps/web/lib/incidents.json must be exactly what the current
        # pipeline produces — a pipeline change without a regenerated
        # export means the UI is rendering stale results.
        run: |
          python scripts/export_incidents.py
          git diff --exit-code apps/web/lib/incidents.json

  web-build:
    name: web build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run build

  deploy-verify:
    # Build step 9, verified end to end on every push: container image ->
    # kind cluster -> helm install -> readiness -> HTTP through the Service.
    # EKS/ArgoCD are the same chart + the manifest in infra/k8s/argocd,
    # pending AWS access; this job is the proof the deployable artifacts
    # actually deploy.
    name: container + kind deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build container image
        run: docker build -t culprit-web:ci apps/web
      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: culprit-ci
      - name: Load image into kind
        run: kind load docker-image culprit-web:ci --name culprit-ci
      - name: Lint chart
        run: helm lint infra/helm/culprit-platform
      - name: Deploy via Helm and wait for readiness
        run: >-
          helm install culprit infra/helm/culprit-platform
          --set web.image.repository=culprit-web
          --set web.image.tag=ci
          --wait --timeout 180s
      - name: Prove the deployed service serves real incidents
        run: |
          kubectl get pods -o wide
          kubectl port-forward svc/culprit-web 8080:80 &
          sleep 5
          curl -fsS http://localhost:8080/incidents | grep -q "Incidents" \
            && echo "kind-deployed web UI is serving the incident list"
